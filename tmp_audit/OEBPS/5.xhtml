<p class="indent9">“아프리카에서 가젤은 아침에 일어날 때마다</p>
<p class="indent9">가장 빠른 사자보다 더 빨리 달리지 않으면 죽는다는 사실을 상기한다.</p>
<p class="indent9">사자도 아침에 깨어나면 가장 느리게 달리는 가젤보다</p>
<p class="indent9">더 빨리 달리지 않으면 굶어 죽는다는 생각을 한다.</p>
<p class="indent9">당신이 사자 쪽이든 가젤 편이든 이는 중요하지 않다.</p>
<p class="indent9">어쨌든 해가 뜨면 달리기 시작해야 한다.”</p>
<p class="remark">• 아프리카 속담 •</p>
