<p class="t3-copy-title">수련 기간 중 터틀들의 운용성과</p>
<p class="c7">&#160;</p>
<p>&#160;</p>
<p>아래 운용성과는 지금까지 공개된 적이 없다. 다음 데이터는 터틀들이 리처드 데니스를 위해 운용하던 기간에 기록한 실제 운용성과와 월별 운용금액이다.</p>
